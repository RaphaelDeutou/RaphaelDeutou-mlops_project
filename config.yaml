# config.yaml - Configuration centrale du pipeline (utilisée par train.py et CI/CD)
data:
  raw_path: "data/raw/creditcard.csv"
  processed_path: "data/processed/creditcard_processed.csv"
  download_url: "https://storage.googleapis.com/download.tensorflow.org/data/creditcard.csv"

preprocessing:
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  scale_features: true
  handle_outliers: true

models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
  random_forest:
    n_estimators: 150
    max_depth: 12
    class_weight: "balanced"
  xgboost:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 6
    scale_pos_weight: 577  # 284807 / 492 ≈ ratio fraudes
    random_state: 42
  isolation_forest:  # bonus anomalie detection
    contamination: 0.00172

training:
  experiment_name: "credit_fraud_detection"
  seed: 42
  tracking_uri: "http://mlflow:5000"

evaluation:
  metrics: ["pr_auc", "roc_auc", "f1", "precision", "recall"]
  promotion_threshold: 0.01  # PR-AUC doit être > best_previous - 1%

mlflow:
  artifact_location: "mlruns"