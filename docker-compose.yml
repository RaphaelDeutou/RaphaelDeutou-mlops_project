# === FICHIER : docker-compose.yml (VERSION SIMPLIFIÉE ET STABLE) ===
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db

  train:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mlops-train
    depends_on:
      - mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    volumes:
      - .:/app
    # Petit délai pour laisser MLflow démarrer
    command: ["sh", "-c", "sleep 15 && python src/train.py --config config.yaml"]

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mlops-api
    depends_on:
      - mlflow
    ports:
      - "8001:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]